spring.application.name=appointment-service

# =========================================================
# PostgreSQL
# =========================================================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/appointment_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:password}

server.port=${SERVER_PORT:8080}


# =========================================================
# JPA / Hibernate
# =========================================================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# =========================================================
# Flyway
# =========================================================

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


# =========================================================
# Actuator
# =========================================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


# =========================================================
# Doctor configuration
# =========================================================

app.doctor.name=DrMyKare
app.doctor.specialization=GeneralMedicine


# =========================================================
# JWT
# =========================================================

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}


# =========================================================
# Kafka producer
# =========================================================

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000

# The consumer is Python, so Java type information is unnecessary.
spring.kafka.producer.properties.spring.json.add.type.headers=false

app.kafka.topics.appointment-notifications=${APPOINTMENT_NOTIFICATION_TOPIC:appointment-notifications}


# =========================================================
# Internal worker API
# =========================================================

app.internal.api-key=${INTERNAL_API_KEY:mykare-internal-secret}


# =========================================================
# CORS
# =========================================================

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}


# =========================================================
# Logging
# =========================================================

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [transactionId=%X{transactionId:-N/A}] %logger{36} - %msg%n

logging.level.root=INFO
logging.level.com.mykare.appointment_service=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.hibernate.SQL=WARN


# =========================================================
# OpenAPI and Swagger UI
# =========================================================

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.try-it-out-enabled=true