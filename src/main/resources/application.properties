spring.application.name=appointment-service

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/appointment_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:password}
server.port=${SERVER_PORT:8080}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.doctor.name=DrMyKare
app.doctor.specialization=GeneralMedicine

# JWT
app.jwt.secret=${JWT_SECRET:TXlLYXJlQXBwb2ludG1lbnRTZXJ2aWNlU2VjdXJlSldUU2VjcmV0S2V5MjAyNg==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000

app.kafka.topics.appointment-notifications=${APPOINTMENT_NOTIFICATION_TOPIC:appointment-notifications}

# Used only by the Python worker to update notification status
app.internal.api-key=${INTERNAL_API_KEY:mykare-internal-secret}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [transactionId=%X{transactionId:-N/A}] %logger{36} - %msg%n