services:
  postgres:
    image: postgres:16
    container_name: appointment-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - appointment_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U admin -d appointment_db"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  kafka:
    image: apache/kafka:4.1.2
    container_name: appointment-kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: >
        INTERNAL://:29092,
        CONTROLLER://:29093,
        EXTERNAL://:9092

      KAFKA_ADVERTISED_LISTENERS: >
        INTERNAL://kafka:29092,
        EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        INTERNAL:PLAINTEXT,
        CONTROLLER:PLAINTEXT,
        EXTERNAL:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3

    volumes:
      - appointment_kafka_data:/var/lib/kafka/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"


  appointment-service:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: appointment-service
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

      kafka:
        condition: service_healthy

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/appointment_db
      DB_USERNAME: admin
      DB_PASSWORD: password

      SERVER_PORT: 8080

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 3600000

      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APPOINTMENT_NOTIFICATION_TOPIC: appointment-notifications

      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

      CORS_ALLOWED_ORIGINS: http://localhost:5173

      LOG_PATH: /app/logs

    ports:
      - "8080:8080"

    volumes:
      - ./logs/booking-service:/app/logs

    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"


  notification-worker:
    build:
      context: ./notification-worker
      dockerfile: Dockerfile

    container_name: appointment-notification-worker
    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_healthy

      appointment-service:
        condition: service_started

    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: appointment-notifications
      KAFKA_GROUP_ID: appointment-notification-workers

      APPOINTMENT_SERVICE_URL: http://appointment-service:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_USE_TLS: "true"

      LOG_PATH: /app/logs
      LOG_LEVEL: INFO
      LOG_FILE_NAME: notification-worker.log

    volumes:
      - ./logs/notification-worker:/app/logs

    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"


volumes:
  appointment_postgres_data:
  appointment_kafka_data: